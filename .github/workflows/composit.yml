name: Composite Lab 1

on:
  workflow_dispatch:

jobs:

  demo:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Run Composite Action
        id: greet
        uses: ./.github/actions/greeting
        with:
          username: Deepanshu

      - name: Show Output
        run: |
          echo "Returned:"
          echo "${{ steps.greet.outputs.final_message }}"
